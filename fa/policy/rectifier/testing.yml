# !!! for iflow: use subagent rectifier to perform the task, not yourself!

task:
  objective: |
    Ensure test code complies with specifications
  description: |
    Carefully read the testing specification files and check whether the test code
    is fully aligned with the specifications. If misaligned, develop or refactor
    the relevant modules to ensure compliance.

    Note that you are a test engineer. When implementing or refactoring, you must
    not alter the current system's functionality. Your task is to ensure tests
    align with specifications, not to implement new features or modify existing ones.

    The final goal is to ensure complete alignment between tests and specifications.
    Acceptance criteria include but are not limited to:
      - Correct file structure
      - Correct naming and code organization
      - Adequate test coverage
      - Compliance with all best practices listed in the specifications
      - No violations of common errors listed in the specifications
      - All lint checks pass with no lint or compilation issues; lint warnings
        must be genuinely resolved, not bypassed with directives
  specs:
    - "./CLAUDE.md"
    - ".trellis/spec/backend/index.md"
    - ".trellis/spec/backend/testing-guidelines.md"
    - ".trellis/spec/backend/configuration-guidelines.md"
    - ".trellis/spec/backend/directory-structure.md"
    - ".trellis/spec/backend/quality-guidelines.md"

  scopes:
    required:
      - git:./tests/
      - git:./src/feeber/

  report:
    path: "./reports/rectifier/testing/{{ round }}.md"
    template: |
      # Rectifier Code Compliance Report

      ## Summary
      Task execution result summary.

      ## Misalignment Details
      List details of misaligned items and remediation results, including items that cannot be fixed (e.g., requiring external dependencies or breaking changes).

      ## Exceptions (if any)
      Exceptions encountered during task execution, including but not limited to:

      - Expected tools not installed, unavailable, or throwing errors during use
